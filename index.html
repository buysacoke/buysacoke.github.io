<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>buysacoke.com</title>
  <style>
    body {
      font-family: Verdana, Geneva, sans-serif;
      font-size: 14px;
      line-height: 1.8;
      color: #222;
      background: #fff;
      max-width: 540px;
      margin: 80px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    h2 {
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-top: 40px;
      margin-bottom: 12px;
    }

    a {
      color: #00c;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .project {
      margin-bottom: 14px;
    }

    .project a {
      font-weight: bold;
    }

    .project span {
      color: #555;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 36px 0;
    }

    footer {
      margin-top: 60px;
      color: #aaa;
      font-size: 12px;
    }

<body>

  <h1>buysacoke.com</h1>
  <p>A small collection of projects.</p>

  <hr class="divider">

  <h2>Games</h2>

  <div class="project">
    <a href="/zombies-in-space">Zombies in Space</a><br>
    <span>A browser-based arcade shooter. Works on desktop and iPad.</span>
  </div>

  <h2>Coming Soon</h2>
